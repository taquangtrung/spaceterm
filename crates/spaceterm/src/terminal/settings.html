<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: {{BG}};
  --fg: {{FG}};
  --accent: {{ACCENT}};
  --panel: {{PANEL}};
  --border: {{BORDER}};
}
html, body {
  height: 100%;
  background: var(--bg);
  color: var(--fg);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
.wrap {
  max-width: 640px;
  margin: 0 auto;
  padding: 32px 28px 48px;
  height: 100%;
  overflow-y: auto;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}
h1 { font-size: 22px; font-weight: 600; }
.close-btn {
  border: 1px solid var(--border);
  background: transparent;
  color: var(--fg);
  border-radius: 6px;
  padding: 6px 14px;
  font-size: 13px;
  cursor: pointer;
}
.close-btn:hover { background: var(--panel); }
section {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 18px;
  margin-bottom: 20px;
}
h2 {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  opacity: 0.6;
  margin: 14px 0 6px;
}
.row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  border-top: 1px solid var(--border);
}
.row:first-of-type { border-top: none; }
.row label { flex: 1; }
.row .hint { display: block; font-size: 12px; opacity: 0.5; margin-top: 2px; }
select, input[type="text"], input[type="number"] {
  background: var(--bg);
  color: var(--fg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 13px;
  min-width: 160px;
}
input[type="color"] {
  width: 44px;
  height: 28px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  cursor: pointer;
  padding: 2px;
}
input[type="range"] { min-width: 160px; }
input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
.range-row { display: flex; align-items: center; gap: 10px; }
.range-row output { font-variant-numeric: tabular-nums; min-width: 32px; text-align: right; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Settings</h1>
    <button class="close-btn" id="close">Close (Esc)</button>
  </header>

  <h2>Appearance</h2>
  <section>
    <div class="row">
      <label for="theme">Theme</label>
      <select id="theme" data-key="theme"></select>
    </div>
    <div class="row">
      <label for="menu_style">Menu style</label>
      <select id="menu_style" data-key="menu_style">
        <option value="modern">Modern (hamburger)</option>
        <option value="classic">Classic (menubar)</option>
      </select>
    </div>
    <p class="row hint" style="border-top:1px solid var(--border);padding-top:12px;">
      Individual colors are configured in <code>settings.kdl</code>.
    </p>
  </section>

  <h2>Status bar</h2>
  <section>
    <div class="row">
      <label for="status_enabled">Show status bar</label>
      <input type="checkbox" id="status_enabled" data-key="status.enabled">
    </div>
    <div class="row">
      <label for="status_show_mode">Show mode indicator</label>
      <input type="checkbox" id="status_show_mode" data-key="status.show_mode">
    </div>
    <div class="row">
      <label for="status_show_title">Show pane title</label>
      <input type="checkbox" id="status_show_title" data-key="status.show_title">
    </div>
    <div class="row">
      <label for="status_show_branding">Show branding</label>
      <input type="checkbox" id="status_show_branding" data-key="status.show_branding">
    </div>
  </section>

  <h2>Text</h2>
  <section>
    <div class="row">
      <label for="font_family">Font family
        <span class="hint">Applies on restart</span>
      </label>
      <input type="text" id="font_family" data-key="font_family" placeholder="monospace">
    </div>
    <div class="row">
      <label for="font_size">Font size
        <span class="hint">Applies on restart</span>
      </label>
      <input type="number" id="font_size" data-key="font_size" min="6" max="72" step="1">
    </div>
    <div class="row">
      <label for="opacity">Opacity
        <span class="hint">Applies on restart</span>
      </label>
      <span class="range-row">
        <input type="range" id="opacity" data-key="opacity" min="0.1" max="1.0" step="0.05">
        <output id="opacity_out"></output>
      </span>
    </div>
  </section>
</div>

<script>
const STATE = {{STATE_JSON}};

function send(key, value) {
  window.ipc.postMessage(JSON.stringify({ type: "set", key, value: String(value) }));
}
function close() {
  window.ipc.postMessage(JSON.stringify({ type: "close" }));
}

// Build the theme dropdown from the built-in + folder themes the host listed.
const themeSelect = document.getElementById("theme");
for (const opt of STATE.theme_options || []) {
  const option = document.createElement("option");
  option.value = opt.value;
  option.textContent = opt.label;
  themeSelect.appendChild(option);
}

// Seed each control from STATE, keyed by its element id.
for (const el of document.querySelectorAll("[data-key]")) {
  const value = STATE[el.id];
  if (value === undefined) continue;
  if (el.type === "checkbox") {
    el.checked = value === true || value === "true";
  } else {
    el.value = value;
  }
}

const opacityOut = document.getElementById("opacity_out");
const opacity = document.getElementById("opacity");
function syncOpacity() { opacityOut.value = Number(opacity.value).toFixed(2); }
syncOpacity();
opacity.addEventListener("input", syncOpacity);

// Push every change back to the host. `change` covers selects, color, text,
// number, and checkbox commits; `input` keeps the range output live.
for (const el of document.querySelectorAll("[data-key]")) {
  el.addEventListener("change", () => {
    const value = el.type === "checkbox" ? el.checked : el.value;
    send(el.dataset.key, value);
  });
}

document.getElementById("close").addEventListener("click", close);
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") close();
});
</script>
</body>
</html>
